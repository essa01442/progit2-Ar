name: Build Pro Git PDF

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.1'
        bundler-cache: true
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y fonts-liberation fonts-dejavu fonts-arabeyes fonts-farsiweb
        
    - name: Install Ruby dependencies
      run: |
        bundle install
        
    - name: Build PDF
      run: |
        bundle exec rake book:build_pdf
        
    - name: Build all formats (optional)
      run: |
        bundle exec rake book:build
      continue-on-error: true
        
    - name: Upload PDF as artifact
      uses: actions/upload-artifact@v4
      with:
        name: progit-arabic-pdf
        path: progit.pdf
        if-no-files-found: error
        
    - name: Upload all formats
      uses: actions/upload-artifact@v4
      with:
        name: progit-arabic-all-formats
        path: |
          progit.pdf
          progit.epub
          progit.mobi
          progit.html
        if-no-files-found: ignore
      
    - name: Get current date
      id: date
      run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
      
    - name: Create Release
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ steps.date.outputs.date }}-${{ github.run_number }}
        name: Pro Git العربية - ${{ steps.date.outputs.date }}
        body: |
          📚 **كتاب Pro Git - الإصدار الثاني (العربية)**
          
          تم بناء الكتاب تلقائياً من الكود المصدري.
          
          ### الملفات المتاحة:
          - 📄 `progit.pdf` - نسخة PDF (موصى بها)
          - 📱 `progit.epub` - نسخة EPUB للقراء الإلكترونية
          - 📖 `progit.mobi` - نسخة Kindle
          - 🌐 `progit.html` - نسخة HTML
          
          **Build ID:** ${{ github.run_number }}
          **Commit:** ${{ github.sha }}
        files: |
          progit.pdf
          progit.epub
          progit.mobi
          progit.html
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true
