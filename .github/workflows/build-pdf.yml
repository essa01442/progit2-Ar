name: Build Pro Git PDF

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # للتشغيل اليدوي

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.1'
        bundler-cache: true
        
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y fonts-liberation fonts-dejavu fonts-arabeyes fonts-farsiweb
        bundle install
        
    - name: Build PDF
      run: |
        bundle exec rake book:build_pdf
        
    - name: Build All Formats
      run: |
        bundle exec rake book:build
      continue-on-error: true
        
    - name: Upload PDF Artifact
      uses: actions/upload-artifact@v3
      with:
        name: progit-arabic-pdf
        path: progit.pdf
        
    - name: Upload All Formats
      uses: actions/upload-artifact@v3
      with:
        name: progit-arabic-all-formats
        path: |
          progit.pdf
          progit.epub
          progit.mobi
          progit.html
      continue-on-error: true
      
    - name: Create Release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_number }}
        name: Pro Git Arabic - Build ${{ github.run_number }}
        files: |
          progit.pdf
          progit.epub
          progit.mobi
          progit.html
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true
